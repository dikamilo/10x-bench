# run-model-attempts consumes this file.
#
# `image` names the per-benchmark Docker image (built from benchmark/Dockerfile)
# that already contains the harness CLIs and the stack runtime the agent needs.
# The skill pulls this image, pins its digest, and runs each attempt against it.
#
# This file is NOT model-visible. It must not leak scoring details.

image: ghcr.io/10xbench/przeprogramowani:2026-05-06
attempts_default: 3
prompt_file: benchmark/prompt.md
allowed_harnesses:
  - opencode
  - claude-code
  - codex

# Optional per-harness defaults the skill falls back on when no --model is
# given on the call. Resolution order:
#   explicit on call  >  defaults.<harness>.model  >  CLI's vendor default
#
# - opencode    REQUIRED somewhere (no vendor default; OpenRouter needs a
#               fully-qualified model id).
# - claude-code OPTIONAL — omit to use the CLI default; set to pin a tier
#               like claude-opus-4-7 vs claude-sonnet-4-6.
# - codex       OPTIONAL — same idea.
defaults:
  opencode:
    model: openrouter/z-ai/glm-4.7
  # claude-code:
  #   model: claude-sonnet-4-6
  # codex:
  #   model: gpt-5-codex
